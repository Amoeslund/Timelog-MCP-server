name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Decide if PR is safe to auto-merge
        id: safe
        env:
          UPDATED_JSON: ${{ steps.meta.outputs.updated-dependencies-json }}
        run: |
          set -euo pipefail
          COUNT=$(jq 'length' <<< "$UPDATED_JSON")
          HAS_MAJOR=$(jq 'any(.updateType == "version-update:semver-major")' <<< "$UPDATED_JSON")
          if [ "$COUNT" -gt 0 ] && [ "$HAS_MAJOR" = "false" ]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
          else
            echo "safe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve and enable auto-merge
        if: steps.safe.outputs.safe == 'true'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
